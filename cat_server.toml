# CAT Server configuration
# CLI flags override these values at runtime without modifying this file.
# Use --config PATH to load a file from a non-default location.

[server]
host = "0.0.0.0"
port = 50101

[audio]
audio_port = 5004
no_audio = false

[user_buttons]
# label: max 7 characters; type: "normal" (momentary) or "push" (toggle)
label_1 = "UsrBtn1"
type_1 = "normal"
label_2 = "UsrBtn2"
type_2 = "normal"
label_3 = "UsrBtn3"
type_3 = "normal"
label_4 = "UsrBtn4"
type_4 = "normal"
label_5 = "UsrBtn5"
type_5 = "normal"
label_6 = "UsrBtn6"
type_6 = "normal"

[user_mods]
# label: max 4 characters; user-defined modulation button labels shown in the
# mode row of the GUI. Fill slots in order: 1, 2, 3, 4, 5 (no skipping).
# type: "normal" (acts like a regular mode button), "text" (splits the AF/
#       audio box so a read-only text panel shows text sent by the server),
#       or "text_input" (same split, but the text panel itself is split into
#       an upper read-only area and a bottom 3-line editable input box that
#       sends text to the server on Enter, like an RTTY chat).
label_1 = "APRS"
type_1 = "text"
label_2 = "RTTY"
type_2 = "text_input"
label_3 = "FT8"
type_3 = "normal"
label_4 = "FT2"
type_4 = "normal"
label_5 = "WSPR"
type_5 = "normal"

[rf_usr_btns]
# RF user buttons: shown left of the band buttons in the GUI frequency area.
# label: max 5 characters; mode: "normal" (momentary) or "push" (toggle).
# Buttons with empty labels are hidden in the GUI.
label_1 = "BUsr1"
mode_1 = "normal"
label_2 = "BUsr2"
mode_2 = "normal"
label_3 = "BUsr3"
mode_3 = "normal"
label_4 = "BUsr4"
mode_4 = "normal"
label_5 = "BUsr5"
mode_5 = "normal"
label_6 = "BUsr6"
mode_6 = "normal"
label_7 = "BUsr7"
mode_7 = "normal"
label_8 = "BUsr8"
mode_8 = "normal"
label_9 = "BUsr9"
mode_9 = "normal"
label_10 = "BUsra"
mode_10 = "normal"
label_11 = "BUsrb"
mode_11 = "normal"
