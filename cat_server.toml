# CAT Server configuration
# CLI flags override these values at runtime without modifying this file.
# Use --config PATH to load a file from a non-default location.

[server]
host = "0.0.0.0"
port = 50101

[audio]
audio_port = 5004
no_audio = false

[devices]
# Up to 20 SDR device profiles. label_N = display name shown in the GUI
# Device list; config_N = path to a TOML config file loaded on selection.
# Devices with empty labels are hidden. Fill slots in order: 1, 2, 3…
label_1 = "Device Demo 1"
config_1 = "cat_device.toml"
label_2 = "Device Demo 2"
config_2 = "cat_device2.toml"
