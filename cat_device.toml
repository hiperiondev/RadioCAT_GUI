# CAT Device configuration
# Describes ONE device profile's GUI buttons: user-defined buttons,
# user-defined modulation buttons, RF user buttons, and the selectable
# SDR sample rates. No [devices] section here -- the list of selectable
# device profiles lives only in cat_server.toml's [devices] section.
# CLI flags override these values at runtime without modifying this file.
# Use --device-config PATH to load a file from a non-default location.
#
# This file's structure is reused for every device profile: each entry
# in cat_server.toml's [devices] section (config_N) should point to
# another file shaped exactly like this one -- a 'cat_device.toml-like
# file' -- loaded wholesale when that device is selected in the GUI.

[user_buttons]
# label: max 7 characters
# type: "normal" (momentary press), "push" (push-push toggle), or
#       "list" (opens a selection list; choice persists on the button)
# list_N: comma-separated items shown in the list dialog when type is "list"
#         (max 20 characters per item; unused when type != "list")
label_1 = ""
type_1 = "normal"
list_1 = ""
label_2 = ""
type_2 = "normal"
list_2 = ""
label_3 = ""
type_3 = "normal"
list_3 = ""
label_4 = ""
type_4 = "normal"
list_4 = ""
label_5 = ""
type_5 = "normal"
list_5 = ""
label_6 = ""
type_6 = "normal"
list_6 = ""
label_7 = ""
type_7 = "normal"
list_7 = ""
label_8 = ""
type_8 = "normal"
list_8 = ""
label_9 = ""
type_9 = "normal"
list_9 = ""
label_10 = ""
type_10 = "normal"
list_10 = ""
label_11 = ""
type_11 = "normal"
list_11 = ""
label_12 = ""
type_12 = "normal"
list_12 = ""
label_13 = ""
type_13 = "normal"
list_13 = ""
label_14 = ""
type_14 = "normal"
list_14 = ""

[user_mods]
# label: max 4 characters; user-defined modulation button labels shown in the
# mode row of the GUI. Fill slots in order: 1, 2, ..., 10 (no skipping).
# type: "normal" (acts like a regular mode button), "text" (splits the AF/
#       audio box so a read-only text panel shows text sent by the server),
#       or "text_input" (same split, but the text panel itself is split into
#       an upper read-only area and a bottom 3-line editable input box that
#       sends text to the server on Enter, like an RTTY chat).
label_1 = ""
type_1 = "normal"
label_2 = ""
type_2 = "normal"
label_3 = ""
type_3 = "normal"
label_4 = ""
type_4 = "normal"
label_5 = ""
type_5 = "normal"
label_6 = ""
type_6 = "normal"
label_7 = ""
type_7 = "normal"
label_8 = ""
type_8 = "normal"
label_9 = ""
type_9 = "normal"
label_10 = ""
type_10 = "normal"

[rf_usr_btns]
# RF user buttons: shown left of the band buttons in the GUI frequency area.
