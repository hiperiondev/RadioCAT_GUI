# Traducciones al español para device_xiegu_g90.toml
# Formato: "etiqueta_original" = "etiqueta_traducida"
# Cada sección corresponde al grupo de botones del dispositivo.
# Solo se traducen las etiquetas que aparecen en el archivo de dispositivo;
# las etiquetas sin entrada aquí conservan su texto original en inglés.

[user_buttons]
# Botones de usuario (14 slots, máx. 7 caracteres visibles en el botón)
"PREATT" = "PRE/ATT"
"NB"     = "RUIDO"
"COMP"   = "COMP"
"VOX"    = "VOX"
"ATU"    = "ATU"
"VFOSWP" = "VFOA/B"
"A=B"    = "A=B"
"MEM"    = "MEM"
"MW"     = "GRABAR"
"SCAN"   = "BARRE"
"DISP"   = "BRILLO"
"INPUT"  = "ENTRADA"

# Ítems de lista del botón PREATT (list_1: "Normal, Preamp, Atten")
"Normal" = "Normal"
"Preamp" = "Preamp"
"Atten"  = "Atenuador"

# Ítems de lista del botón INPUT (list_14: "Mic, Line")
"Mic"  = "Micrófono"
"Line" = "Línea"

[user_mods]
# Botones de modulación (máx. 4 caracteres visibles).
# Los modos digitales/técnicos internacionales se mantienen igual.
"AM"   = "AM"
"FM"   = "FM"
"LSB"  = "LSB"
"USB"  = "USB"
"CW"   = "CW"
"CWR"  = "CWR"
"L-D"  = "L-D"
"U-D"  = "U-D"
"CWM"  = "CWM"

[rf_usr_btns]
# Botones RF de usuario (izquierda del selector de banda, máx. 7 caracteres).
# Una pulsación corta ejecuta la acción; una pulsación larga (~1s) abre
# el cuadro de configuración -- ver la sección [rf_btn_config] de abajo
# para las traducciones de esos cuadros.
"RFGAIN"  = "GANRF"
"MICGAIN" = "GANMIC"
"SWRTHR"  = "UMBROE"
"AGC"     = "AGC"
"NB"      = "RUIDO"
"COMP"    = "COMP"
"VOX"     = "VOX"
"PREATT"  = "PRE/ATT"
"CWKEY"   = "MANIP"
"MICFUNC" = "FUNMIC"
"SYSTEM"  = "SISTEM"

[rf_btn_config]
# Traducciones para los cuadros de configuración (pulsación larga) de los
# botones RF de usuario: nombres de ítem (mostrados como etiqueta de fila)
# y las "key" visibles de los ítems tipo "list" dentro de config_N.
# Nombres de ítem (filas del cuadro de configuración):
"RF Gain"             = "Ganancia RF"
"Mic Gain"             = "Ganancia Mic"
"SWR Threshold"        = "Umbral ROE"
"SWR Scan Step (kHz)"  = "Paso de Barrido ROE (kHz)"
"AGC Mode"             = "Modo AGC"
"Noise Blanker"        = "Anti-ruido"
"NB Level"             = "Nivel NB"
"Compressor"           = "Compresor"
"Comp Level"           = "Nivel Comp."
"VOX"                  = "VOX"
"VOX Gain"             = "Ganancia VOX"
"VOX Delay"            = "Retardo VOX"
"Anti-VOX"             = "Anti-VOX"
"Setting"              = "Ajuste"
"Speed (WPM)"          = "Velocidad (PPM)"
"Keyer Mode"           = "Modo Manipulador"
"CW Pitch"             = "Tono CW"
"CW Volume"            = "Volumen CW"
"QSK"                  = "QSK"
"QSK Delay"            = "Retardo QSK"
"Dot:Dash Ratio"       = "Relación Punto:Raya"
"CW Decoder"           = "Decodificador CW"
"CW Trainer"           = "Entrenador CW"
"Up/Down"              = "Subir/Bajar"
"F1 Function"          = "Función F1"
"F2 Function"          = "Función F2"
"Display Brightness"   = "Brillo de Pantalla"
"RCLK Tune"            = "Ajuste Reloj Ref."
"AUX IN Volume"        = "Volumen Entrada AUX"
"AUX OUT Volume"       = "Volumen Salida AUX"
"Band Stack Mode"      = "Modo de Banda"
"ON/OFF Beep"          = "Pitido Encendido/Apagado"
"Filter Center"        = "Centro del Filtro"
"Filter Width"         = "Ancho del Filtro"
"Squelch Level"        = "Nivel de Silenciador"
"FFT Averaging"        = "Promediado FFT"
"FFT Scale"            = "Escala FFT"
"RIT"                  = "RIT"
"RIT Offset (Hz)"      = "Desvío RIT (Hz)"

# Claves ("key") de los ítems tipo "list" mostrados en los desplegables:
"Auto"          = "Auto"
"Fast"          = "Rápido"
"Slow"          = "Lento"
"Off"           = "Apagado"
"Freq CH +/-"   = "Frec/Canal +/-"
"Band +/-"      = "Banda +/-"
"Volume +/-"    = "Volumen +/-"
"PRE/ATT"       = "PRE/ATT"
"Split"         = "Split"
"NB"            = "NB"
"HAM Band"      = "Banda Radioaficionado"
"Full Band"     = "Banda Completa"

[antenna]
# Etiquetas de puerto de antena (máx. ~20 caracteres recomendados)
"End Fed"    = "Dipolo extremo"
"Dipole 80m" = "Dipolo 80m"
"Dipole 40m" = "Dipolo 40m"
"Yagi 10m"   = "Yagi 10m"
