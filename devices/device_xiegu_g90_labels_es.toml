# Traducciones al español para device_xiegu_g90.toml
# Formato: "etiqueta_original" = "etiqueta_traducida"
# Cada sección corresponde al grupo de botones del dispositivo.
# Solo se traducen las etiquetas que aparecen en el archivo de dispositivo;
# las etiquetas sin entrada aquí conservan su texto original en inglés.
#
# NOTA: este archivo se actualizó junto con device_xiegu_g90.toml (revisión 2:
# auditoría de funcionalidad frente al manual oficial del G90/S y las hojas
# de referencia KE8WO). Se agregaron traducciones para los 4 botones RF
# nuevos (FILTER, SQL, FFTAVG, RIT) y para los ítems añadidos a las
# ventanas de configuración de VOX, CWKEY, SWRTHR y SYSTEM. Las claves de
# abajo coinciden exactamente con los label_N, list_N e ítems de config_N
# del archivo de dispositivo actual.
#
# NOTA (revisión 3): se agregaron traducciones para dos ítems nuevos
# encontrados en la segunda auditoría: "CW Volume" (volumen del tono
# lateral CW, dentro de CWKEY) y "FFT Scale" (nivel de referencia del
# espectro/cascada, dentro de FFTAVG, con sus valores de lista Auto/2-10).
# Las claves numéricas ("2".."10") no requieren traducción y no se
# agregaron entradas para ellas.
#
# LIMITACIÓN CONOCIDA (heredada): la función "Call Sign" (indicativo, texto
# libre mostrado al encender el equipo) no está mapeada en device_xiegu_g90.toml
# porque el esquema de config_N no admite un tipo de entrada de texto libre
# (solo slide/list/check/radio). No requiere traducción hasta que se
# implemente.

[user_buttons]
# Botones de usuario (14 slots, máx. 7 caracteres visibles en el botón)
"PREATT" = "PRE/ATT"
"NB"     = "RUIDO"
"COMP"   = "COMP"
"VOX"    = "VOX"
"SPLIT"  = "SPLIT"
"LOCK"   = "BLOQ"
"ATU"    = "ATU"
"VFOSWP" = "VFOA/B"
"A=B"    = "A=B"
"MEM"    = "MEM"
"MW"     = "GRABAR"
"SCAN"   = "BARRE"
"DISP"   = "BRILLO"
"INPUT"  = "ENTRADA"

# Ítems de lista del botón PREATT (list_1: "Normal, Preamp, Atten")
"Normal" = "Normal"
"Preamp" = "Preamp"
"Atten"  = "Atenuador"

# Ítems de lista del botón INPUT (list_14: "Mic, Line")
"Mic"  = "Micrófono"
"Line" = "Línea"

[user_mods]
# Botones de modulación (máx. 4 caracteres visibles).
# Los modos digitales/técnicos internacionales se mantienen igual.
"AM"   = "AM"
"FM"   = "FM"
"LSB"  = "LSB"
"USB"  = "USB"
"CW"   = "CW"
"APRS" = "APRS"
"RTTY" = "RTTY"
"FT8"  = "FT8"
"FT2"  = "FT2"
"J2CL" = "J2CL"

[rf_usr_btns]
# Botones RF de usuario (izquierda del selector de banda, máx. 7 caracteres).
# Una pulsación corta ejecuta la acción; una pulsación larga (~1s) abre
# el cuadro de configuración -- ver la sección [rf_btn_config] de abajo
# para las traducciones de esos cuadros.
"RFGAIN"  = "GANRF"
"MICGAIN" = "GANMIC"
"SWRTHR"  = "UMBROE"
"AGC"     = "AGC"
"NB"      = "RUIDO"
"COMP"    = "COMP"
"VOX"     = "VOX"
"PREATT"  = "PRE/ATT"
"CWKEY"   = "MANIP"
"MICFUNC" = "FUNMIC"
"SYSTEM"  = "SISTEM"
"FILTER"  = "FILTRO"
"SQL"     = "SILEN"
"FFTAVG"  = "FFTAVG"
"RIT"     = "RIT"

