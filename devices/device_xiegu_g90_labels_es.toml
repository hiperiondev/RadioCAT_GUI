# LIMITACIÓN CONOCIDA: las opciones de los controles tipo "radio" (las de
# "Setting": Normal/Preamp/Attenuator, y "Keyer Mode": Straight/Iambic A/
# Iambic B) no pasan actualmente por el mecanismo de _label_overrides en
# cat_gui.py (solo se traduce el nombre del ítem, no sus opciones de
# radio), por lo que añadir entradas aquí para "Attenuator", "Straight",
# "Iambic A" o "Iambic B" no tendría efecto hasta que se extienda ese
# soporte en el cliente.

