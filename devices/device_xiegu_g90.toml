# CAT Device configuration -- Xiegu G90
# Describes ONE device profile's GUI buttons: user-defined buttons,
# user-defined modulation buttons, RF user buttons, and the selectable
# SDR sample rates. No [devices] section here -- the list of selectable
# device profiles lives only in cat_server.toml's [devices] section.
# CLI flags override these values at runtime without modifying this file.
# Use --device-config PATH to load a file from a non-default location.
#
# This file's structure is reused for every device profile: each entry
# in cat_server.toml's [devices] section (config_N) should point to
# another file shaped exactly like this one -- a 'cat_device.toml-like
# file' -- loaded wholesale when that device is selected in the GUI.
#
# Mapping rationale (G90 firmware v1.7x/v1.8x, CI-V over 19200 baud):
#   - [user_buttons]: quick momentary/toggle/list actions, mirroring the
#     G90's front-panel short-press functions (no parameters). This row
#     is a hard 14-slot limit in the GUI and every slot is already
#     assigned to a real G90 short-press function -- nothing left to add.
#   - [rf_usr_btns]: same physical row as the band buttons. A SHORT press
#     fires the button's primary action; a LONG press (~1s) opens a
#     config window (slide/list/check/radio) for functions that carry a
#     numeric level or mode on the G90. TX power is intentionally NOT
#     mapped to an rf_usr_btn -- it uses the GUI's dedicated Power
#     selector, driven by [sdr] power_levels below.
#
# REVISION 3 -- follow-up functionality audit against the official G90/S
# manuals (v4.32-v4.34), the KE8WO cheat sheets (v1.71 through v1.79b03),
# and the G90 sight-impaired panel-layout guide (fw 1.74). Added two
# further previously-unmapped G90 features and documented one structural
# gap that can't be closed without user input:
#   - CW Volume : sidetone VOLUME (0-15), distinct from the CW Pitch
#                (sidetone frequency) already mapped -- front panel:
#                KEY then POW, adjust with Volume control.
#   - FFT Scale : spectrum/waterfall reference-level setting (Auto, or
#                2-10). Lives in the SAME FUNC+LOCK submenu as FFT
#                Averaging -- first LOCK press = Scale, second press =
#                Averaging -- so it's added into the FFTAVG button
#                alongside averaging rather than as a separate button.
#                NOTE: on firmware >=1.79b03 this value is reportedly
#                fixed at "Auto" and no longer user-changeable; kept
#                here since older/mainstream firmware still allows it.
#   - KNOWN LIMITATION (structural, not fixed here): the G90's native
#     mode cycle is LSB-L-D-USB-U-D-CW-CWR-NFM-AM. Three of those modes
#     -- CWR (CW reverse) and the two data modes LSB-Data (L-D) and
#     USB-Data (U-D), added in firmware 1.79b02 -- have no [user_mods]
#     button. The user_mods row is a hard 10-slot cap and all 10 slots
#     are already assigned (AM/FM/LSB/USB/CW/APRS/RTTY/FT8/FT2/J2CL), so
#     adding these would require removing an existing custom button --
#     a choice left to the operator rather than made silently here. If
#     you want them exposed, the most likely candidates to free up are
#     FT2 or J2CL (less commonly used than FT8/RTTY/APRS).
#
# REVISION 2 -- functionality audit against the official G90/S manual
# (v4.2.1/v4.32) and the KE8WO cheat sheets (v1.71/v1.75). Added
# previously-unmapped G90 features:
#   - FILTER : DSP receive filter center frequency + bandwidth
#              (front panel: FUNC+CMP for low edge, FUNC+NB for high edge)
#   - SQL    : squelch level (multi-function knob long-press menu)
#   - FFTAVG : FFT averaging count 1-10 (FUNC+LOCK)
#   - RIT    : receiver incremental tuning on/off + offset (long-press
#              of the main tuning knob)
#   - CWKEY  : extended with CW Pitch (sidetone), QSK on/off, QSK delay,
#              dot:dash ratio, and CW decoder toggle (all live under the
#              front-panel KEY button's settings, previously only speed
#              and keyer mode were exposed)
#   - VOX    : extended with Anti-VOX (hand-mic speaker noise-trip
#              suppression, part of the front-panel VOX menu)
#   - SWRTHR : extended with SWR scan step size 1-5 kHz (used by the
#              long-press POW antenna SWR sweep)
#   - SYSTEM : extended with AUX IN/OUT volume (System Menu items 5/6),
#              Band Stack Mode (HAM Band/Full Band, System Menu item 8),
#              and ON/OFF power-up beep (System Menu item 9)
#
# KNOWN LIMITATION: Call Sign entry (System Menu item, shown briefly on
# boot) is a free-text field on the radio. The current config_N schema
# only supports slide/list/check/radio widget types -- there is no text
# entry type -- so Call Sign cannot be exposed via a config window
# without extending that schema in cat_gui.py. Not mapped here.
#
# Some menu option lists (esp. mic F1/F2 assignable functions, and exact
# CW QSK delay / dot:dash ratio ranges) come from third-party G90 cheat
# sheets rather than a single authoritative manual table -- double check
# against your firmware's System Menu and adjust the "values"/"options"/
# "range" entries below if your unit differs.

[user_buttons]
