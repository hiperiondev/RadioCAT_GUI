label_2 = "Dipole 80m"
label_3 = "Dipole 40m"
label_4 = "Yagi 10m"
label_5 = ""
label_6 = ""
label_7 = ""
label_8 = ""
label_9 = ""
label_10 = ""
allowed_bands_1 = "20m,17m"
allowed_bands_2 = "80m"
allowed_bands_3 = "40m"
allowed_bands_4 = "10m"
allowed_bands_5 = ""
allowed_bands_6 = ""
allowed_bands_7 = ""
allowed_bands_8 = ""
allowed_bands_9 = ""
allowed_bands_10 = ""

[bandwidth]
# CWR, L-D, and U-D share the same DSP filter/demodulator as their parent
# mode (CW, LSB, USB respectively) -- only the sideband/BFO offset used for
# TX differs -- so each mirrors its parent's filter width options.
AM = "3000,6000,9000,10000"
FM = "12500,25000"
LSB = "2700,3600"
USB = "2700,3600"
CW = "250,500,1000,2000"
CWR = "250,500,1000,2000"
# CWM (CW message-memory slot, label_9 above) shares CW's demodulator and
# filter, so it mirrors CW's filter width options.
CWM = "250,500,1000,2000"
L-D = "2700,3600"
U-D = "2700,3600"
APRS = "12500"
RTTY = "12500"
FT8 = "12500"
FT2 = "12500"
J2CL = "12500"
FT4 = "12500"
