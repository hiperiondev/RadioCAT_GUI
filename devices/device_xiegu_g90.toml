# CAT Device configuration -- Xiegu G90
# Describes ONE device profile's GUI buttons: user-defined buttons,
# user-defined modulation buttons, RF user buttons, and the selectable
# SDR sample rates. No [devices] section here -- the list of selectable
# device profiles lives only in cat_server.toml's [devices] section.
# CLI flags override these values at runtime without modifying this file.
# Use --device-config PATH to load a file from a non-default location.
#
# File header note: Call Sign (the free-text boot-screen identifier the G90
# lets an operator store in its System Menu) is intentionally NOT exposed
# anywhere below. The rf_usr_btns config popup only supports four widget
# types -- slide, list, check, radio (see the [rf_usr_btns] comment block) --
# none of which is a free-text field, so this GUI has no way to edit or
# display it without a code change. If a future GUI version adds a text-
# input widget type to rf_usr_btns config popups, Call Sign should be added
# as that new type under the SYSTEM button (label_11/config_11).

[user_buttons]
# label: max 7 characters
# type: "normal" (momentary press), "push" (push-push toggle), or
#       "list" (opens a selection list; choice persists on the button)
# list_N: comma-separated items shown in the list dialog when type is "list"
#         (max 20 characters per item; unused when type != "list")
label_1 = "PREATT"
type_1 = "list"
list_1 = "Normal, Preamp, Atten"
label_2 = "NB"
type_2 = "push"
list_2 = ""
label_3 = "COMP"
type_3 = "push"
list_3 = ""
label_4 = "VOX"
type_4 = "push"
list_4 = ""
label_5 = "DISP"
type_5 = "normal"
list_5 = ""
label_6 = "INPUT"
type_6 = "list"
list_6 = "Mic, Line"
label_7 = "ATU"
type_7 = "normal"
list_7 = ""
label_8 = "VFOSWP"
type_8 = "normal"
list_8 = ""
label_9 = "A=B"
type_9 = "normal"
list_9 = ""
label_10 = "MEM"
type_10 = "push"
list_10 = ""
label_11 = "MW"
type_11 = "normal"
list_11 = ""
label_12 = "SCAN"
type_12 = "normal"
list_12 = ""
label_13 = ""
type_13 = ""
list_13 = ""
label_14 = ""
type_14 = ""
list_14 = ""

[user_mods]
# label: max 4 characters; user-defined modulation button labels shown in the
# mode row of the GUI. Fill slots in order: 1, 2, ..., 10 (no skipping).
# type: "normal" (acts like a regular mode button), "text" (splits the AF/
#       audio box so a read-only text panel shows text sent by the server),
#       or "text_input" (same split, but the text panel itself is split into
#       an upper read-only area and a bottom 3-line editable input box that
#       sends text to the server on Enter, like an RTTY chat).
#
# The G90's native mode cycle is: CW, CWR, AM, NFM, LSB, L-D, USB, U-D
# (8 modes total). CWR (CW reverse sideband) and the two data modes,
# LSB-Data (L-D) and USB-Data (U-D) -- added in firmware 1.79b02 -- are
# audio-routing variants of CW/LSB/USB with no on-radio text decode, so
# they use type "normal" like their parent mode. Slot 9 is used for the
# G90's CW message-memory feature (System function: 4 preset telegraphy
# texts stored for automatic calling in CW mode -- see label_9 below).
# Slot 10 remains free (no further distinct native mode/feature to map).
label_1 = "AM"
type_1 = "normal"
label_2 = "FM"
type_2 = "normal"
label_3 = "LSB"
type_3 = "normal"
label_4 = "USB"
type_4 = "normal"
label_5 = "CW"
type_5 = "normal"
label_6 = "CWR"
type_6 = "normal"
label_7 = "L-D"
type_7 = "normal"
label_8 = "U-D"
type_8 = "normal"
# CW message memory: same CW demodulator/filter as label_5 ("CW"), but
# opens the read/write text-chat panel (type "text_input") so the operator
# can compose and store the radio's 4 preset CW call texts and trigger
# automatic playback, mirroring the G90's MW/MC-button CW-message feature.
label_9 = "CWM"
type_9 = "text_input"
label_10 = ""
type_10 = ""

[rf_usr_btns]
# RF user buttons: shown left of the band buttons in the GUI frequency area.
# label: max 7 characters; mode: "normal" (momentary) or "push" (toggle).
# config_N: JSON object mapping item name -> spec dict, shown in a popup
# window on LONG press (~1s hold). Supported spec "type" values:
#   slide  -> {"type":"slide","range":[lo,hi]}
#   list   -> {"type":"list","values":[{"key":"Disp","val":"server_val"}, ...]}
#   check  -> {"type":"check"}
#   radio  -> {"type":"radio","options":["Opt1","Opt2",...]}
# Buttons with empty labels are hidden in the GUI.

# RF Gain (front panel: long-press AGC, 0-100%, default 50)
label_1 = "RFGAIN"
mode_1 = "normal"
config_1 = '{"RF Gain": {"type": "slide", "range": [0, 100]}}'

# Mic Gain (System menu: 0-20, default ~10)
label_2 = "MICGAIN"
mode_2 = "normal"
config_2 = '{"Mic Gain": {"type": "slide", "range": [0, 20]}}'

# SWR alarm threshold (1.8-3.6) -- lives under the front-panel POW button
# sequence on the radio. TX power itself is NOT mapped here; it's set via
# the GUI's own Power selector, which reads [sdr] power_levels below.
# SWR Scan Step: step size used by the long-press POW antenna SWR sweep
# (scans the antenna's SWR-vs-frequency plot without the tuner in circuit).
label_3 = "SWRTHR"
mode_3 = "normal"
config_3 = '{"SWR Threshold": {"type": "slide", "range": [1.8, 3.6]}, "SWR Scan Step (kHz)": {"type": "slide", "range": [1, 5]}}'

# AGC mode: Auto / Fast / Slow / Off, plus Squelch Level. Squelch is set
# via the same multi-function-knob menu system as AGC on the real radio
# (MFK short press -> SQL item), so it's grouped here rather than given
# its own slot -- see REVISION 4 note at top of file.
label_4 = "AGC"
mode_4 = "normal"
config_4 = '{"AGC Mode": {"type": "list", "values": [{"key": "Auto", "val": "auto"}, {"key": "Fast", "val": "fast"}, {"key": "Slow", "val": "slow"}, {"key": "Off", "val": "off"}]}, "Squelch Level": {"type": "slide", "range": [0, 9]}}'

# Noise Blanker: enable + level, plus the DSP receive filter (center
# frequency + bandwidth of the variable digital filter). Grouped here
# because the front panel's FUNC+NB combo directly adjusts the filter's
# high edge -- the physical NB button is already part of how Filter is
# set on the real radio (FUNC+CMP adjusts the low edge). Ranges are
# generous since the usable window shifts with mode/bandwidth -- the
# radio clamps internally. See REVISION 4 note at top of file.
label_5 = "NB"
mode_5 = "normal"
config_5 = '{"Noise Blanker": {"type": "check"}, "NB Level": {"type": "slide", "range": [0, 10]}, "Filter Center": {"type": "slide", "range": [100, 3000]}, "Filter Width": {"type": "slide", "range": [50, 3000]}}'

# Speech Compressor: enable + level
label_6 = "COMP"
mode_6 = "normal"
config_6 = '{"Compressor": {"type": "check"}, "Comp Level": {"type": "slide", "range": [0, 10]}}'

# VOX: enable + gain + delay (hang time) + Anti-VOX (hand-mic speaker
# noise-trip suppression, part of the same front-panel VOX menu)
label_7 = "VOX"
mode_7 = "normal"
config_7 = '{"VOX": {"type": "check"}, "VOX Gain": {"type": "slide", "range": [0, 100]}, "VOX Delay": {"type": "slide", "range": [0, 20]}, "Anti-VOX": {"type": "slide", "range": [0, 100]}}'

# Preamp/Attenuator front-end setting
label_8 = "PREATT"
mode_8 = "normal"
config_8 = '{"Setting": {"type": "radio", "options": ["Normal", "Preamp", "Attenuator"]}}'

# CW keyer speed (WPM) + keyer mode, plus the rest of the KEY button's
# settings: sidetone pitch, sidetone VOLUME (0-15, distinct from pitch --
# front panel: KEY then POW, set with the Volume control), QSK on/off +
# delay, dot:dash ratio, and the CW auto-decoder toggle (long-press KEY
# on the radio). CW Trainer mirrors the KEY-button practice mode: with it
# enabled the radio still keys and produces the sidetone locally but never
# transmits RF, for silent off-air code practice.
label_9 = "CWKEY"
mode_9 = "normal"
config_9 = '{"Speed (WPM)": {"type": "slide", "range": [5, 40]}, "Keyer Mode": {"type": "radio", "options": ["Straight", "Iambic A", "Iambic B"]}, "CW Pitch": {"type": "slide", "range": [300, 1000]}, "CW Volume": {"type": "slide", "range": [0, 15]}, "QSK": {"type": "check"}, "QSK Delay": {"type": "slide", "range": [0, 10]}, "Dot:Dash Ratio": {"type": "slide", "range": [2.5, 3.5]}, "CW Decoder": {"type": "check"}, "CW Trainer": {"type": "check"}}'

# Hand mic programmable button assignments (System Menu items 6-8 on the
# G90: Handle Up/Down, Handle F1, Handle F2)
label_10 = "MICFUNC"
mode_10 = "normal"
config_10 = '{"Up/Down": {"type": "list", "values": [{"key": "Freq CH +/-", "val": "freq"}, {"key": "Band +/-", "val": "band"}, {"key": "Volume +/-", "val": "volume"}]}, "F1 Function": {"type": "list", "values": [{"key": "PRE/ATT", "val": "preatt"}, {"key": "Split", "val": "split"}, {"key": "NB", "val": "nb"}, {"key": "Compressor", "val": "comp"}]}, "F2 Function": {"type": "list", "values": [{"key": "PRE/ATT", "val": "preatt"}, {"key": "Split", "val": "split"}, {"key": "NB", "val": "nb"}, {"key": "Compressor", "val": "comp"}]}}'

# Display brightness (5 levels) + reference clock fine tuning, the
# remaining System Menu items (ACC port AUX IN/OUT volume -- items 5/6,
# Band Stack Mode -- item 8: HAM Band restricts stacking to ham
# allocations, Full Band allows the whole receive range, and power-up
# ON/OFF beep -- item 9), plus two settings with no dedicated physical
# button of their own, grouped here as general display/operating
# refinements (see REVISION 4 note at top of file):
#   - FFT Averaging (FUNC+LOCK, 1-10, smooths the waterfall/spectrum) and
#     FFT Scale, the spectrum/waterfall reference-level setting living in
#     the same FUNC+LOCK submenu (first LOCK press = Scale, second press
#     = Averaging). Auto is the default; 2-10 raise the noise floor
#     reference (10 = lowest sensitivity). NOTE: reported fixed at "Auto"
#     (not adjustable) on firmware >=1.79b03 -- included for older/
#     mainstream firmware where it remains user-settable.
#   - RIT (Receiver Incremental Tuning): enable + offset, set via a
#     long-press of the main tuning knob on the radio. Offset range is
#     an estimate -- adjust if your firmware reports a different limit.
# Call Sign (free-text) is NOT included -- see file header note.
label_11 = "SYSTEM"
mode_11 = "normal"
config_11 = '{"Display Brightness": {"type": "slide", "range": [1, 5]}, "RCLK Tune": {"type": "slide", "range": [-100, 100]}, "AUX IN Volume": {"type": "slide", "range": [0, 100]}, "AUX OUT Volume": {"type": "slide", "range": [0, 100]}, "Band Stack Mode": {"type": "list", "values": [{"key": "HAM Band", "val": "ham"}, {"key": "Full Band", "val": "full"}]}, "ON/OFF Beep": {"type": "check"}, "FFT Averaging": {"type": "slide", "range": [1, 10]}, "FFT Scale": {"type": "list", "values": [{"key": "Auto", "val": "auto"}, {"key": "2", "val": "2"}, {"key": "3", "val": "3"}, {"key": "4", "val": "4"}, {"key": "5", "val": "5"}, {"key": "6", "val": "6"}, {"key": "7", "val": "7"}, {"key": "8", "val": "8"}, {"key": "9", "val": "9"}, {"key": "10", "val": "10"}]}, "RIT": {"type": "check"}, "RIT Offset (Hz)": {"type": "slide", "range": [-3000, 3000]}}'

[sdr]
# sample_rate: SDR hardware sample rate (Hz) applied when this device
# profile is loaded -- must be one of the values listed in sample_rates.
# An active --iq_wav recording always overrides this with its own rate.
# sample_rates: comma-separated list of sample rates (Hz) the operator can
# choose from the GUI's "Sample Rate" dialog for this device.
# allowed_bands: comma-separated list of amateur bands this device permits
# (e.g. "160m,80m,40m,20m,10m"). Omit or set to all 11 bands to allow
# everything. Disallowed bands are greyed out in the GUI; in restrict-band
# mode, frequencies within disallowed bands are also blocked.
# power_levels: comma-separated list of TX power levels in watts shown in
# the GUI Power selector (e.g. "5.0,10.0,25.0,50.0,100.0").
# Empty or omitted = power selector is hidden in the GUI.
sample_rate = 192000
sample_rates = "192000,250000,500000,1000000,2000000"
allowed_bands = "160m,80m,60m,40m,30m,20m,17m,15m,12m,10m"
power_levels = "1.0,2.0,5.0,10.0,20.0"

[antenna]
# label_N (N=1..10): human-readable label for antenna port N shown
# in the GUI Antenna selector. Empty = slot unused/hidden. The GUI sends
# the 1-based index of the chosen antenna back to the server.
# allowed_bands_N (N=1..10): comma-separated bands allowed when
# antenna N is selected (e.g. "160m,80m,40m,20m,10m"). Empty string means
# inherit the device-level allowed_bands restriction. Valid names:
# 160m 80m 60m 40m 30m 20m 17m 15m 12m 10m 6m.
