# Traducciones al español para device_dummy.toml
# Formato: clave_original = "etiqueta_traducida"
# Cada sección corresponde a un grupo de botones del dispositivo.
# Las etiquetas sin entrada aquí conservan su texto original en inglés.
#
# Regla de claves:
#   - Usar bare keys (sin comillas) siempre que sea posible.
#   - Usar claves entre comillas dobles solo cuando contengan espacios
#     (p.ej. las etiquetas de antena), ya que TOML así lo requiere.

[user_buttons]
# Botones de usuario (14 slots, máx. 7 caracteres visibles)
UsrBtn  = "BtnUsr"
UsrBtn2 = "BtnUsr2"
UsrBtn3 = "BtnUsr3"
UsrBtn4 = "BtnUsr4"
UsrBtn5 = "BtnUsr5"
UsrBtn6 = "BtnUsr6"
UsrBtn7 = "BtnUsr7"
UsrBtn8 = "BtnUsr8"
UsrBtn9 = "BtnUsr9"
UsrBtnA = "BtnUsrA"
UsrBtnB = "BtnUsrB"
UsrBtnC = "BtnUsrC"
UsrBtnD = "BtnUsrD"
UsrBtnE = "BtnUsrE"

[user_mods]
# Botones de modulación (máx. 4 caracteres visibles).
# Los modos digitales/técnicos internacionales se mantienen igual.
AM   = "AM"
FM   = "FM"
LSB  = "LSB"
USB  = "USB"
CW   = "CW"
APRS = "APRS"
RTTY = "RTTY"
FT8  = "FT8"
FT2  = "FT2"
J2CL = "J2CL"

[rf_usr_btns]
# Botones RF de usuario (izquierda del selector de banda, máx. 7 caracteres)
BtnUsr1 = "BRF1"
BtnUsr2 = "BRF2"
BtnUsr3 = "BRF3"
BtnUsr4 = "BRF4"
BtnUsr5 = "BRF5"
BtnUsr6 = "BRF6"
BtnUsr7 = "BRF7"
BtnUsr8 = "BRF8"
BtnUsr9 = "BRF9"
BtnUsra = "BRFa"
BtnUsrb = "BRFb"

[rf_usr_btn_config]
# Etiquetas de fila del diálogo de configuración de botones RF (larga pulsación).
# Las claves son los nombres JSON del campo config_N en [rf_usr_btns] del TOML
# del dispositivo (p.ej. "BW", "Noise", "Mode", "Profile" de config_1).
# También se traducen los valores de lista mostrados en el diálogo
# (p.ej. las keys de los objetos {key, val} en un item de tipo "list").
BW      = "Ancho de banda"
Noise   = "Ruido"
Mode    = "Modo"
Profile = "Perfil"
Wide    = "Ancho"
Narrow  = "Estrecho"

[antenna]
# Etiquetas de puerto de antena.
# Las etiquetas con espacios requieren comillas dobles como clave TOML.
"End Fed"    = "Dipolo extremo"
"Dipole 80m" = "Dipolo 80m"
"Dipole 40m" = "Dipolo 40m"
"Yagi 10m"   = "Yagi 10m"
